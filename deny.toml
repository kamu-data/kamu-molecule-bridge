[bans]
multiple-versions = "deny"
skip-tree = [
    { name = "hashbrown" },
    { name = "rand" }, # Waiting for alloy and other crates to upgrade to 0.9+
    { name = "thiserror" },
    { name = "digest" },
    { name = "convert_case" },
    { name = "itertools" },
]

# We should always specify version ranges
wildcards = "deny"
allow-wildcard-paths = true

deny = [
    { name = "openssl-sys", reason = "We use rustls throughout the project" },
    { name = "native-tls", reason = "We use rustls throughout the project" },
]

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = false
unused = "deny"


[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
private = { ignore = true }


[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-org = { github = ["kamu-data"] }


[advisories]
yanked = "deny"
unused-ignored-advisory = "deny"

ignore = [
    # dotenv (Unmaintained)
    # https://rustsec.org/advisories/RUSTSEC-2021-0141
    "RUSTSEC-2021-0141",
    # paste (Unmaintained)
    # https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",
    # proc-macro-error2 (Unmaintained)
    # https://rustsec.org/advisories/RUSTSEC-2026-0173
    "RUSTSEC-2026-0173",
]
